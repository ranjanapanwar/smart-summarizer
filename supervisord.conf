[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log

[program:FastAPI]
command=uvicorn main:app --host 0.0.0.0 --port 8000
autostart=true
autorestart=true
stdout_logfile=/var/log/smart-summarizer-back.out.log
stderr_logfile=/var/log/smart-summarizer.back.err.log


[program:Gradio]
command=python app.py
autostart=true
autorestart=true
stdout_logfile=/var/log/smart-summarizer-front.out.log
stderr_logfile=/var/log/smart-summarizer-front.err.log
